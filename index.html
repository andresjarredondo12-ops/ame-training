<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELITE TRAINING SYSTEM AI PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

h1{
margin-bottom:20px;
color:#60a5fa;
}

.panel{
background:#0f172a;
padding:20px;
border-radius:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#334155;
color:white;
}

button{
padding:14px 24px;
background:#2563eb;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
}

.day{
background:#111827;
padding:20px;
border-radius:15px;
margin-top:20px;
border-left:5px solid #2563eb;
}

.block{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:12px;
line-height:1.8;
}

.tag{
display:inline-block;
padding:6px 12px;
background:#2563eb;
border-radius:20px;
font-size:12px;
margin-bottom:10px;
}

h2{
margin-bottom:15px;
color:#93c5fd;
}

</style>
</head>

<body>

<div class="container">

<h1>🏋️ ELITE TRAINING SYSTEM AI PRO</h1>

<div class="panel">

<h2>CrossFit Planner</h2>

<div class="grid">

<div class="card">
<h3>Objetivo</h3>

<select id="goal">
<option>Fuerza</option>
<option>Aeróbico</option>
<option>Competencia</option>
<option>Híbrido</option>
</select>

</div>

<div class="card">
<h3>Días/Semana</h3>

<select id="days">
<option>3</option>
<option>4</option>
<option>5</option>
</select>

</div>

<div class="card">
<h3>Back Squat RM</h3>
<input type="number" id="squat" value="140">
</div>

<div class="card">
<h3>Deadlift RM</h3>
<input type="number" id="deadlift" value="180">
</div>

<div class="card">
<h3>Bench RM</h3>
<input type="number" id="bench" value="110">
</div>

<div class="card">
<h3>Clean RM</h3>
<input type="number" id="clean" value="120">
</div>

<div class="card">
<h3>Snatch RM</h3>
<input type="number" id="snatch" value="90">
</div>

</div>

<button onclick="generateRoutine()">
GENERAR RUTINA
</button>

<div id="output"></div>

</div>

</div>

<script>

function calc(rm,percent){

return Math.round((rm*percent)/100);

}

function createDay(day,type,content){

return `

<div class="day">

<div class="tag">${type}</div>

<h2>${day}</h2>

<div class="block">

${content}

</div>

</div>

`;

}

function generateRoutine(){

let goal=document.getElementById("goal").value;

let days=parseInt(document.getElementById("days").value);

let squat=parseInt(document.getElementById("squat").value);

let deadlift=parseInt(document.getElementById("deadlift").value);

let bench=parseInt(document.getElementById("bench").value);

let clean=parseInt(document.getElementById("clean").value);

let snatch=parseInt(document.getElementById("snatch").value);

let html=`<h2 style="margin-top:20px;">🔥 PLAN SEMANAL</h2>`;

let routine=[];

/* ================= FUERZA ================= */

if(goal==="Fuerza"){

routine=[

{
day:"LUNES",
type:"Strength",
content:`

<b>BACK SQUAT</b><br>
5x3 @ 80% (${calc(squat,80)}kg)<br><br>

<b>BENCH PRESS</b><br>
4x5 @ 75% (${calc(bench,75)}kg)<br><br>

<b>WOD</b><br>
AMRAP 10:<br>
10 Pull Ups<br>
15 Wall Balls<br>
200m Run

`
},

{
day:"MIÉRCOLES",
type:"Olympic",
content:`

<b>CLEAN & JERK</b><br>
6x2 @ 75% (${calc(clean,75)}kg)<br><br>

<b>FRONT SQUAT</b><br>
4x4 @ 75%<br><br>

<b>WOD</b><br>
4 Rounds:<br>
10 Power Cleans<br>
12 Box Jumps<br>
12 Cal Bike

`
},

{
day:"VIERNES",
type:"Power",
content:`

<b>DEADLIFT</b><br>
5x3 @ 82% (${calc(deadlift,82)}kg)<br><br>

<b>PUSH PRESS</b><br>
4x6 @ 70%<br><br>

<b>WOD</b><br>
For Time:<br>
21-15-9<br>
Thrusters<br>
Burpees

`
},

{
day:"SÁBADO",
type:"Conditioning",
content:`

<b>SNATCH</b><br>
5x2 @ 70% (${calc(snatch,70)}kg)<br><br>

<b>WOD</b><br>
15 Min AMRAP:<br>
12 KB Swings<br>
12 Toes To Bar<br>
250m Row

`
},

{
day:"DOMINGO",
type:"Recovery",
content:`

30 Min Bike Erg Z2<br>
Mobility Full Body<br>
Core Work 3x20

`
}

];

}

/* ================= AEROBICO ================= */

if(goal==="Aeróbico"){

routine=[

{
day:"LUNES",
type:"Engine",
content:`

5 Sets:<br>
3 Min Row RPE6<br>
1 Min Bike RPE8

`
},

{
day:"MIÉRCOLES",
type:"Conditioning",
content:`

20 Min AMRAP:<br>
400m Run<br>
20 Air Squats<br>
15 Sit Ups

`
},

{
day:"VIERNES",
type:"Intervals",
content:`

6 Rounds:<br>
250m Row Sprint<br>
15 Burpees<br>
Rest 1 Min

`
},

{
day:"SÁBADO",
type:"Long Session",
content:`

40 Min Zone 2 Run<br>
Stretching + Mobility

`
}

];

}

/* ================= COMPETENCIA ================= */

if(goal==="Competencia"){

routine=[

{
day:"LUNES",
type:"Heavy Strength",
content:`

<b>FRONT SQUAT</b><br>
5-4-3-2-1<br>
RPE 6 → 8<br><br>

<b>WOD</b><br>
4 Sets:<br>
15m Walking Lunges<br>
15m Handstand Walk<br>
Rest 1:1

`
},

{
day:"MARTES",
type:"Snatch Technique",
content:`

<b>HANG POWER SNATCH</b><br>
5x2 @ 70% (${calc(snatch,70)}kg)<br><br>

<b>SNATCH BALANCE</b><br>
4x3<br><br>

<b>WOD</b><br>
AMRAP 15:<br>
15 Cal Bike<br>
15 Cal Row<br>
200m Run

`
},

{
day:"JUEVES",
type:"Clean + Gymnastics",
content:`

<b>CLEAN & JERK</b><br>
5x2 @ 75% (${calc(clean,75)}kg)<br><br>

<b>STRICT RING DIPS</b><br>
4x8<br><br>

<b>WOD</b><br>
3 Rounds:<br>
12 Power Cleans<br>
12 Toes To Bar<br>
12 Burpees

`
},

{
day:"SÁBADO",
type:"Competition WOD",
content:`

5 Rounds:<br>
12 Power Snatch<br>
30 Double Unders<br>
15 Cal Bike

`
}

];

}

/* ================= HIBRIDO ================= */

if(goal==="Híbrido"){

routine=[

{
day:"LUNES",
type:"Strength",
content:`

BACK SQUAT 5x5 @ 75% (${calc(squat,75)}kg)<br>
BENCH PRESS 4x8 @ 70% (${calc(bench,70)}kg)

`
},

{
day:"MIÉRCOLES",
type:"Olympic",
content:`

SNATCH 6x2 @ 70% (${calc(snatch,70)}kg)<br>
CLEAN & JERK 5x2 @ 75% (${calc(clean,75)}kg)

`
},

{
day:"VIERNES",
type:"Conditioning",
content:`

5 Rounds:<br>
400m Run<br>
15 KB Swings<br>
12 Box Jumps

`
},

{
day:"SÁBADO",
type:"Hybrid WOD",
content:`

AMRAP 20:<br>
10 Pull Ups<br>
15 Push Ups<br>
20 Air Squats

`
}

];

}

/* ================= RENDER ================= */

routine.slice(0,days).forEach(r=>{

html+=createDay(r.day,r.type,r.content);

});

document.getElementById("output").innerHTML=html;

}

</script>

</body>
</html>
