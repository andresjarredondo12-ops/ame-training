<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELITE TRAINING SYSTEM AI PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
}

.container{
max-width:1600px;
margin:auto;
}

h1{
margin-bottom:20px;
color:#60a5fa;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab-btn{
padding:14px 22px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.tab-btn.active{
background:#2563eb;
}

.panel{
display:none;
background:#0f172a;
padding:20px;
border-radius:16px;
}

.panel.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#334155;
color:white;
}

button{
padding:14px 22px;
background:#2563eb;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
margin-right:10px;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
}

.day{
background:#111827;
padding:20px;
border-radius:15px;
margin-top:20px;
border-left:5px solid #2563eb;
}

.block{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:12px;
line-height:1.8;
}

h2{
margin-bottom:15px;
color:#93c5fd;
}

h3{
margin-bottom:10px;
color:#cbd5e1;
}

.tag{
display:inline-block;
padding:6px 12px;
background:#2563eb;
border-radius:20px;
font-size:12px;
margin-bottom:10px;
}

.small{
opacity:0.8;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>🏋️ ELITE TRAINING SYSTEM AI PRO</h1>

<div class="tabs">

<button class="tab-btn active" onclick="openTab(event,'crossfit')">
CrossFit
</button>

<button class="tab-btn" onclick="openTab(event,'bodybuilding')">
Musculación
</button>

</div>

<!-- ================= CROSSFIT ================= -->

<div id="crossfit" class="panel active">

<h2>🏋️ CrossFit</h2>

<div class="grid">

<div class="card">
<h3>Objetivo</h3>

<select id="cfGoal">

<option>Fuerza</option>
<option>Aeróbico</option>
<option>Competencia</option>
<option>Híbrido</option>

</select>
</div>

<div class="card">
<h3>Días/Semana</h3>

<select id="cfDays">

<option>3</option>
<option>4</option>
<option>5</option>

</select>
</div>

<div class="card">
<h3>Back Squat RM</h3>
<input type="number" id="cfSquat" placeholder="140">
</div>

<div class="card">
<h3>Deadlift RM</h3>
<input type="number" id="cfDeadlift" placeholder="180">
</div>

<div class="card">
<h3>Bench RM</h3>
<input type="number" id="cfBench" placeholder="110">
</div>

<div class="card">
<h3>Clean RM</h3>
<input type="number" id="cfClean" placeholder="120">
</div>

<div class="card">
<h3>Snatch RM</h3>
<input type="number" id="cfSnatch" placeholder="90">
</div>

</div>

<button onclick="generateCrossfit()">
GENERAR CROSSFIT
</button>

<div id="crossfitOutput"></div>

</div>

<!-- ================= MUSCULACION ================= -->

<div id="bodybuilding" class="panel">

<h2>💪 Musculación</h2>

<div class="grid">

<div class="card">

<h3>Objetivo</h3>

<select id="bbGoal">

<option>Hipertrofia</option>
<option>Fuerza</option>
<option>Powerbuilding</option>

</select>

</div>

<div class="card">

<h3>Días/Semana</h3>

<select id="bbDays">

<option>3</option>
<option>4</option>
<option>5</option>

</select>

</div>

<div class="card">

<h3>Bench RM</h3>
<input type="number" id="bbBench">

</div>

<div class="card">

<h3>Squat RM</h3>
<input type="number" id="bbSquat">

</div>

<div class="card">

<h3>Deadlift RM</h3>
<input type="number" id="bbDeadlift">

</div>

</div>

<button onclick="generateBodybuilding()">
GENERAR MUSCULACIÓN
</button>

<div id="bodybuildingOutput"></div>

</div>

</div>

<script>

/* ================= TABS ================= */

function openTab(event,id){

document.querySelectorAll('.panel').forEach(p=>{
p.classList.remove('active');
});

document.querySelectorAll('.tab-btn').forEach(btn=>{
btn.classList.remove('active');
});

document.getElementById(id).classList.add('active');

event.target.classList.add('active');

}

/* ================= HELPERS ================= */

function calc(rm,percent){

return Math.round((rm*percent)/100);

}

function createDay(title,type,content){

return `

<div class="day">

<div class="tag">${type}</div>

<h2>${title}</h2>

<div class="block">

${content}

</div>

</div>

`;

}

/* ================= CROSSFIT ================= */

function generateCrossfit(){

let goal=document.getElementById("cfGoal").value;

let days=parseInt(document.getElementById("cfDays").value);

let squat=parseInt(document.getElementById("cfSquat").value||140);

let deadlift=parseInt(document.getElementById("cfDeadlift").value||180);

let bench=parseInt(document.getElementById("cfBench").value||110);

let clean=parseInt(document.getElementById("cfClean").value||120);

let snatch=parseInt(document.getElementById("cfSnatch").value||90);

let html=`<h2>🔥 Planificación Semanal CrossFit</h2>`;

let routine=[];

/* ================= OBJETIVO FUERZA ================= */

if(goal==="Fuerza"){

routine=[

{
day:"LUNES",
type:"Strength + WOD",
content:`

<b>BACK SQUAT</b><br>
5x3 @ 80% (${calc(squat,80)}kg)<br><br>

<b>BENCH PRESS</b><br>
4x5 @ 75% (${calc(bench,75)}kg)<br><br>

<b>WOD</b><br>
AMRAP 10:<br>
10 Wall Balls<br>
10 Pull Ups<br>
200m Run

`
},

{
day:"MIÉRCOLES",
type:"Olympic + Conditioning",
content:`

<b>CLEAN & JERK</b><br>
6x2 @ 75% (${calc(clean,75)}kg)<br><br>

<b>FRONT SQUAT</b><br>
4x4 @ 75%<br><br>

<b>WOD</b><br>
5 Rounds:<br>
8 Power Cleans<br>
12 Box Jumps<br>
12/10 Cal Bike

`
},

{
day:"VIERNES",
type:"Deadlift + Gymnastics",
content:`

<b>DEADLIFT</b><br>
5x3 @ 82% (${calc(deadlift,82)}kg)<br><br>

<b>STRICT PULL UPS</b><br>
5x5<br><br>

<b>WOD</b><br>
For Time:<br>
21-15-9<br>
Thrusters<br>
Burpees

`
}

];

}

/* ================= OBJETIVO AEROBICO ================= */

if(goal==="Aeróbico"){

routine=[

{
day:"LUNES",
type:"Engine",
content:`

<b>AEROBIC WORK</b><br>
5 Sets:<br>
3min Row RPE6<br>
1min Bike RPE8<br><br>

<b>WOD</b><br>
20 Min AMRAP:<br>
400m Run<br>
15 KB Swings<br>
15 Sit Ups

`
},

{
day:"MIÉRCOLES",
type:"Mixed Conditioning",
content:`

<b>SKILL</b><br>
Double Unders Practice 10min<br><br>

<b>WOD</b><br>
4 Rounds:<br>
500m Row<br>
20 Wall Balls<br>
15 Toes To Bar

`
},

{
day:"SÁBADO",
type:"Long Session",
content:`

<b>ZONE 2</b><br>
35 Min Bike Erg / Run<br><br>

<b>FINISHER</b><br>
3 Sets:<br>
20 Air Squats<br>
15 Push Ups<br>
10 Pull Ups

`
}

];

}

/* ================= OBJETIVO COMPETENCIA ================= */

if(goal==="Competencia"){

routine=[

{
day:"LUNES",
type:"Strength + WOD",
content:`

<b>FRONT SQUAT</b><br>
5-4-3-2-1<br>
RPE 6 → 8<br><br>

<b>WOD</b><br>
4 Sets:<br>
15m Walking Lunges<br>
15m Handstand Walk<br>
Rest 1:1

`
},

{
day:"MARTES",
type:"Snatch Technique",
content:`

<b>HANG POWER SNATCH</b><br>
5x2 @ 70% (${calc(snatch,70)}kg)<br><br>

<b>SNATCH BALANCE</b><br>
4x3<br><br>

<b>WOD</b><br>
AMRAP 15:<br>
15/12 Cal Bike<br>
15/12 Cal Row<br>
200m Run

`
},

{
day:"JUEVES",
type:"Clean + Gymnastics",
content:`

<b>CLEAN PULL + CLEAN + JERK</b><br>
5 Sets @ RPE 7<br><br>

<b>STRICT RING DIPS</b><br>
4x8<br><br>

<b>WOD</b><br>
3 Rounds:<br>
12 Power Cleans<br>
12 Toes To Bar<br>
12 Burpees

`
},

{
day:"SÁBADO",
type:"Competition Simulation",
content:`

<b>SNATCH</b><br>
3-2-1-1 @ RPE 7<br><br>

<b>CLEAN & JERK</b><br>
2-2-1-1 @ RPE 7<br><br>

<b>WOD</b><br>
For Time:<br>
30 Double Unders<br>
12 Power Snatch<br>
15 Cal Bike<br>
5 Rounds

`
}

];

}

/* ================= OBJETIVO HIBRIDO ================= */

if(goal==="Híbrido"){

routine=[

{
day:"LUNES",
type:"Strength",
content:`

<b>BACK SQUAT</b><br>
5x5 @ 75% (${calc(squat,75)}kg)<br><br>

<b>BENCH PRESS</b><br>
4x8 @ 70% (${calc(bench,70)}kg)<br><br>

<b>WOD</b><br>
12 Min AMRAP:<br>
10 Pull Ups<br>
15 Push Ups<br>
20 Air Squats

`
},

{
day:"MIÉRCOLES",
type:"Olympic Weightlifting",
content:`

<b>SNATCH</b><br>
6x2 @ 70% (${calc(snatch,70)}kg)<br><br>

<b>CLEAN & JERK</b><br>
5x2 @ 75% (${calc(clean,75)}kg)<br><br>

<b>CORE</b><br>
4x20 GHD Sit Ups

`
},

{
day:"VIERNES",
type:"Conditioning",
content:`

<b>WOD</b><br>
5 Rounds:<br>
400m Run<br>
15 KB Swings<br>
12 Box Jumps<br><br>

<b>ACCESSORY</b><br>
Farmer Carry 4x40m

`
}

];

}

routine.slice(0,days).forEach(r=>{
html+=createDay(r.day,r.type,r.content);
});

document.getElementById("crossfitOutput").innerHTML=html;

}

/* ================= MUSCULACION ================= */

function generateBodybuilding(){

let goal=document.getElementById("bbGoal").value;

let days=parseInt(document.getElementById("bbDays").value);

let bench=parseInt(document.getElementById("bbBench").value||100);

let squat=parseInt(document.getElementById("bbSquat").value||140);

let deadlift=parseInt(document.getElementById("bbDeadlift").value||180);

let html=`<h2>💪 Planificación Musculación</h2>`;

if(goal==="Hipertrofia"){

html+=createDay("PUSH","Hipertrofia",`

Bench Press 4x10 @ 70% (${calc(bench,70)}kg)<br>
Incline DB Press 4x12<br>
Shoulder Press 4x10<br>
Lateral Raises 4x15<br>
Tricep Pushdown 4x15

`);

html+=createDay("PULL","Hipertrofia",`

Barbell Row 4x10<br>
Lat Pulldown 4x12<br>
Cable Row 4x12<br>
Face Pull 4x15<br>
Barbell Curl 4x12

`);

html+=createDay("LEGS","Hipertrofia",`

Back Squat 4x10 @ 70% (${calc(squat,70)}kg)<br>
Romanian Deadlift 4x10<br>
Leg Press 4x15<br>
Leg Curl 4x15<br>
Calf Raises 4x20

`);

}

if(goal==="Fuerza"){

html+=createDay("UPPER","Strength",`

Bench Press 5x5 @ 80% (${calc(bench,80)}kg)<br>
Overhead Press 5x5<br>
Weighted Pull Ups 5x5<br>
Pendlay Row 5x5

`);

html+=createDay("LOWER","Strength",`

Back Squat 5x5 @ 80% (${calc(squat,80)}kg)<br>
Deadlift 5x3 @ 85% (${calc(deadlift,85)}kg)<br>
Front Squat 4x5<br>
Core Work

`);

}

if(goal==="Powerbuilding"){

html+=createDay("UPPER POWER","Powerbuilding",`

Bench Press 5x5 @ 80% (${calc(bench,80)}kg)<br>
Incline DB Press 4x12<br>
Weighted Pull Ups 5x5<br>
Rows 4x10

`);

html+=createDay("LOWER POWER","Powerbuilding",`

Back Squat 5x5 @ 80% (${calc(squat,80)}kg)<br>
Deadlift 5x3 @ 85% (${calc(deadlift,85)}kg)<br>
Bulgarian Split Squat 4x12<br>
Leg Press 4x15

`);

}

document.getElementById("bodybuildingOutput").innerHTML=html;

}

</script>

</body>
</html>
