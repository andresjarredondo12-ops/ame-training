<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELITE TRAINING SYSTEM AI PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
}

.container{
max-width:1600px;
margin:auto;
}

h1{
margin-bottom:20px;
color:#60a5fa;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab-btn{
padding:14px 22px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
cursor:pointer;
font-weight:bold;
}

.tab-btn.active{
background:#2563eb;
}

.panel{
display:none;
background:#0f172a;
padding:20px;
border-radius:16px;
}

.panel.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#334155;
color:white;
}

button{
padding:14px 22px;
background:#2563eb;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

button:hover{
background:#1d4ed8;
}

.day{
background:#111827;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.block{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:12px;
line-height:1.8;
}

.progress{
height:24px;
background:#1e293b;
border-radius:12px;
overflow:hidden;
margin-top:20px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:1s;
}

.small{
opacity:0.8;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>🏋️ ELITE TRAINING SYSTEM AI PRO</h1>

<div class="tabs">

<button class="tab-btn active" onclick="openTab(event,'crossfit')">
CrossFit
</button>

<button class="tab-btn" onclick="openTab(event,'bodybuilding')">
Musculación
</button>

</div>

<!-- ================= CROSSFIT ================= -->

<div id="crossfit" class="panel active">

<h2>🏋️ CrossFit</h2>

<div class="grid">

<div class="card">
<h3>Objetivo</h3>

<select id="cfGoal">

<option>Fuerza</option>
<option>Aeróbico</option>
<option>Competencia</option>
<option>Híbrido</option>

</select>
</div>

<div class="card">
<h3>Días/Semana</h3>

<select id="cfDays">

<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>

</select>
</div>

<div class="card">
<h3>Back Squat RM</h3>
<input type="number" id="cfSquat">
</div>

<div class="card">
<h3>Deadlift RM</h3>
<input type="number" id="cfDeadlift">
</div>

<div class="card">
<h3>Bench RM</h3>
<input type="number" id="cfBench">
</div>

<div class="card">
<h3>Clean RM</h3>
<input type="number" id="cfClean">
</div>

<div class="card">
<h3>Snatch RM</h3>
<input type="number" id="cfSnatch">
</div>

</div>

<button onclick="generateCrossfit()">
GENERAR CROSSFIT
</button>

<div id="crossfitOutput"></div>

</div>

<!-- ================= MUSCULACION ================= -->

<div id="bodybuilding" class="panel">

<h2>💪 Musculación</h2>

<div class="grid">

<div class="card">

<h3>Objetivo</h3>

<select id="bbGoal">

<option>Hipertrofia</option>
<option>Fuerza</option>
<option>Powerbuilding</option>

</select>

</div>

<div class="card">

<h3>Días/Semana</h3>

<select id="bbDays">

<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>

</select>

</div>

<div class="card">

<h3>¿Entrenar Piernas?</h3>

<select id="trainLegs">

<option value="yes">Sí</option>
<option value="no">No</option>

</select>

</div>

<div class="card">

<h3>Bench RM</h3>
<input type="number" id="bbBench">

</div>

<div class="card">

<h3>Squat RM</h3>
<input type="number" id="bbSquat">

</div>

<div class="card">

<h3>Deadlift RM</h3>
<input type="number" id="bbDeadlift">

</div>

</div>

<button onclick="generateBodybuilding()">
GENERAR MUSCULACIÓN
</button>

<div class="progress">
<div class="bar" id="bbBar"></div>
</div>

<div id="bodybuildingOutput"></div>

</div>

</div>

<script>

let bbWeek=1;

/* ================= TABS ================= */

function openTab(event,id){

document.querySelectorAll('.panel').forEach(p=>{
p.classList.remove('active');
});

document.querySelectorAll('.tab-btn').forEach(btn=>{
btn.classList.remove('active');
});

document.getElementById(id).classList.add('active');

event.target.classList.add('active');

}

/* ================= HELPERS ================= */

function splitExercises(arr){

let result="";

arr.forEach(ex=>{

result+=ex+"<br>";

});

return result;

}

function calc(rm,percent){

return Math.round((rm*percent)/100);

}

function getPercentages(week,goal){

if(goal==="Hipertrofia"){

if(week<=4) return [65,70,72];

if(week<=8) return [72,75,77];

if(week<=11) return [78,80,82];

return [60];

}

if(goal==="Fuerza"){

if(week<=4) return [75,80,82];

if(week<=8) return [82,85,87];

if(week<=11) return [88,90,92];

return [60];

}

if(goal==="Powerbuilding"){

if(week<=4) return [70,72,75];

if(week<=8) return [75,78,80];

if(week<=11) return [82,85,88];

return [60];

}

return [70];

}

/* ================= MUSCULACION ================= */

function generateBodybuilding(){

let goal=document.getElementById("bbGoal").value;

let days=parseInt(document.getElementById("bbDays").value);

let trainLegs=document.getElementById("trainLegs").value;

let benchRM=parseInt(document.getElementById("bbBench").value||100);

let squatRM=parseInt(document.getElementById("bbSquat").value||140);

let deadliftRM=parseInt(document.getElementById("bbDeadlift").value||180);

let percentages=getPercentages(bbWeek,goal);

let html=`<h2>💪 Semana ${bbWeek}</h2>`;

let p1=percentages[0];
let p2=percentages[1];
let p3=percentages[2];

/* ================= HIPERTROFIA ================= */

if(goal==="Hipertrofia"){

if(days===2){

if(trainLegs==="no"){

html+=`

<div class="day">

<h2>📌 Upper Push</h2>

<div class="block">

Bench Press 4x10 @ ${p1}% (${calc(benchRM,p1)}kg)<br>
Incline DB Press 4x12<br>
Shoulder Press 4x10 @ ${p2}%<br>
Lateral Raises 4x15<br>
Tricep Pushdown 4x15<br>

</div>

</div>

<div class="day">

<h2>📌 Upper Pull</h2>

<div class="block">

Barbell Row 4x10 @ ${p1}%<br>
Lat Pulldown 4x12<br>
Seated Row 4x12<br>
Face Pull 4x15<br>
Barbell Curl 4x12<br>

</div>

</div>

`;

}else{

html+=`

<div class="day">

<h2>📌 Upper</h2>

<div class="block">

Bench Press 4x10 @ ${p1}% (${calc(benchRM,p1)}kg)<br>
Rows 4x10<br>
Shoulder Press 4x10<br>
Pulldown 4x12<br>

</div>

</div>

<div class="day">

<h2>📌 Legs</h2>

<div class="block">

Back Squat 4x10 @ ${p1}% (${calc(squatRM,p1)}kg)<br>
Romanian Deadlift 4x10 @ ${p2}% (${calc(deadliftRM,p2)}kg)<br>
Leg Press 4x15<br>
Leg Curl 4x15<br>

</div>

</div>

`;

}

}

/* ================= 3 DIAS ================= */

if(days===3){

if(trainLegs==="no"){

html+=`

<div class="day">

<h2>📌 Push</h2>

<div class="block">

Bench Press 4x10 @ ${p1}% (${calc(benchRM,p1)}kg)<br>
Incline DB Press 4x12<br>
Shoulder Press 4x10 @ ${p2}%<br>
Lateral Raises 4x15<br>

</div>

</div>

<div class="day">

<h2>📌 Pull</h2>

<div class="block">

Barbell Row 4x10 @ ${p1}%<br>
Lat Pulldown 4x12<br>
Cable Row 4x12<br>
Barbell Curl 4x12<br>

</div>

</div>

<div class="day">

<h2>📌 Upper Full</h2>

<div class="block">

Weighted Dips 4x10<br>
Pullups 4xAMRAP<br>
Machine Press 4x15<br>
Rear Delt Fly 4x15<br>

</div>

</div>

`;

}else{

html+=`

<div class="day">

<h2>📌 Push</h2>

<div class="block">

Bench Press 4x10 @ ${p1}% (${calc(benchRM,p1)}kg)<br>
Shoulder Press 4x10 @ ${p2}%<br>
Lateral Raises 4x15<br>

</div>

</div>

<div class="day">

<h2>📌 Pull</h2>

<div class="block">

Barbell Row 4x10 @ ${p1}%<br>
Lat Pulldown 4x12<br>
Barbell Curl 4x12<br>

</div>

</div>

<div class="day">

<h2>📌 Legs</h2>

<div class="block">

Back Squat 4x10 @ ${p1}% (${calc(squatRM,p1)}kg)<br>
Deadlift 4x8 @ ${p2}% (${calc(deadliftRM,p2)}kg)<br>
Leg Press 4x15<br>

</div>

</div>

`;

}

}

/* ================= 4+ DIAS ================= */

if(days>=4){

if(trainLegs==="no"){

let daysUpper=[

"Push A",
"Pull A",
"Push B",
"Pull B"

];

daysUpper.forEach((d,index)=>{

html+=`

<div class="day">

<h2>📌 ${d}</h2>

<div class="block">

Bench Press 4x10 @ ${p1}% (${calc(benchRM,p1)}kg)<br>
Rows 4x10<br>
Pulldown 4x12<br>
Shoulder Press 4x10<br>
Lateral Raises 4x15<br>

</div>

</div>

`;

});

}else{

let split=["Push","Pull","Legs","Upper"];

split.forEach((d,index)=>{

html+=`

<div class="day">

<h2>📌 ${d}</h2>

<div class="block">

`;

if(d==="Legs"){

html+=`

Back Squat 4x10 @ ${p1}% (${calc(squatRM,p1)}kg)<br>
Deadlift 4x8 @ ${p2}% (${calc(deadliftRM,p2)}kg)<br>
Leg Press 4x15<br>

`;

}else{

html+=`

Bench Press 4x10 @ ${p1}% (${calc(benchRM,p1)}kg)<br>
Rows 4x10<br>
Shoulder Press 4x10<br>
Pulldown 4x12<br>

`;

}

html+=`

</div>

</div>

`;

});

}

}

}

/* ================= FUERZA ================= */

if(goal==="Fuerza"){

if(trainLegs==="no"){

html+=`

<div class="day">

<h2>🏋️ Upper Strength A</h2>

<div class="block">

Bench Press 5x5 @ ${p2}% (${calc(benchRM,p2)}kg)<br>
Weighted Pullups 5x5<br>
Overhead Press 5x5 @ ${p2}%<br>
Barbell Row 5x5<br>

</div>

</div>

<div class="day">

<h2>🏋️ Upper Strength B</h2>

<div class="block">

Incline Bench 5x5 @ ${p3}% (${calc(benchRM,p3)}kg)<br>
Weighted Dips 5x5<br>
Pendlay Row 5x5<br>
Chinups 5x5<br>

</div>

</div>

`;

}else{

html+=`

<div class="day">

<h2>🏋️ Upper</h2>

<div class="block">

Bench Press 5x5 @ ${p2}% (${calc(benchRM,p2)}kg)<br>
Overhead Press 5x5 @ ${p2}%<br>
Rows 5x5<br>

</div>

</div>

<div class="day">

<h2>🏋️ Lower</h2>

<div class="block">

Back Squat 5x5 @ ${p2}% (${calc(squatRM,p2)}kg)<br>
Deadlift 5x3 @ ${p3}% (${calc(deadliftRM,p3)}kg)<br>
Front Squat 4x5<br>

</div>

</div>

`;

}

}

/* ================= POWERBUILDING ================= */

if(goal==="Powerbuilding"){

html+=`

<div class="day">

<h2>💥 Upper Powerbuilding</h2>

<div class="block">

Bench Press 5x5 @ ${p2}% (${calc(benchRM,p2)}kg)<br>
Incline DB Press 4x12<br>
Weighted Pullups 5x5<br>
Rows 4x12<br>

</div>

</div>

`;

if(trainLegs==="yes"){

html+=`

<div class="day">

<h2>💥 Lower Powerbuilding</h2>

<div class="block">

Back Squat 5x5 @ ${p2}% (${calc(squatRM,p2)}kg)<br>
Deadlift 5x3 @ ${p3}% (${calc(deadliftRM,p3)}kg)<br>
Leg Press 4x15<br>
Bulgarian Split Squat 4x12<br>

</div>

</div>

`;

}

}

document.getElementById("bodybuildingOutput").innerHTML=html;

document.getElementById("bbBar").style.width=((bbWeek/12)*100)+"%";

}

</script>

</body>
</html>
