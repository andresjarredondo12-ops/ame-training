<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite CrossFit AI System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
}

.container{
max-width:1500px;
margin:auto;
}

h1{
margin-bottom:20px;
color:#60a5fa;
}

.panel{
background:#0f172a;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
background:#334155;
color:white;
}

button{
padding:14px 22px;
background:#2563eb;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
margin-right:10px;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.day{
background:#111827;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.block{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:12px;
}

h2{
color:#93c5fd;
margin-bottom:10px;
}

h3{
margin-bottom:10px;
color:#f8fafc;
}

.exercise{
margin-bottom:8px;
}

.progress{
height:25px;
background:#1e293b;
border-radius:12px;
overflow:hidden;
margin-top:20px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:1s;
}

.small{
font-size:14px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<h1>🏋️ ELITE CROSSFIT AI TRAINING</h1>

<div class="panel">

<div class="grid">

<div class="card">
<h3>Objetivo</h3>

<select id="goal">
<option>Fuerza</option>
<option>Aeróbico</option>
<option>Competencia</option>
<option>Híbrido</option>
</select>
</div>

<div class="card">
<h3>Nivel</h3>

<select id="level">
<option>Principiante</option>
<option>Intermedio</option>
<option>Avanzado</option>
</select>
</div>

<div class="card">
<h3>Días/Semana</h3>

<select id="days">
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>
</div>

<div class="card">
<h3>Back Squat RM</h3>
<input type="number" id="squat">
</div>

<div class="card">
<h3>Deadlift RM</h3>
<input type="number" id="deadlift">
</div>

<div class="card">
<h3>Bench RM</h3>
<input type="number" id="bench">
</div>

<div class="card">
<h3>Clean RM</h3>
<input type="number" id="clean">
</div>

<div class="card">
<h3>Snatch RM</h3>
<input type="number" id="snatch">
</div>

</div>

<button onclick="generateProgram()">GENERAR PLAN</button>
<button onclick="nextWeek()">ACTUALIZAR SEMANA</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="output"></div>

</div>

</div>

<script>

let currentWeek=1;

const strengthFocus=[
"Back Squat",
"Front Squat",
"Deadlift",
"Bench Press",
"Strict Press",
"Clean",
"Snatch"
];

const gymnasticsBeginner=[
"Ring Rows",
"Kipping Swings",
"Hollow Holds",
"Wall Walks"
];

const gymnasticsIntermediate=[
"Toes To Bar",
"Chest To Bar",
"Handstand Pushups",
"Bar Muscle Up Progressions"
];

const gymnasticsAdvanced=[
"Ring Muscle Ups",
"Handstand Walk",
"Butterfly Pullups",
"Deficit HSPU"
];

const wodsStrength=[
`
FOR TIME:
21-15-9
Deadlifts
Burpees
`,
`
AMRAP 12:
10 Box Jumps
10 Pullups
200m Run
`,
`
EMOM 14:
1: 12 Cal Bike
2: 10 Thrusters
`,
`
5 ROUNDS:
400m Run
15 KB Swings
`
];

const wodsAerobic=[
`
30 MIN ZONE 2 BIKE
`,
`
AMRAP 25:
500m Row
20 Wall Balls
`,
`
5K RUN
`,
`
40 MIN EMOM:
Bike + Row
`
];

const wodsCompetition=[
`
CHIPPER:
50 DU
40 Wall Balls
30 Toes To Bar
20 Cleans
10 RMU
`,
`
FOR TIME:
30 Snatches
30 Pullups
30 Burpees
`,
`
AMRAP 20:
5 BMU
10 Thrusters
15 Cal Row
`,
`
EMOM 24:
Gymnastics + Oly
`
];

const mobility=[
"Hamstrings",
"Thoracic",
"Ankles",
"Hips",
"Shoulders"
];

function getGymnastics(level){

if(level==="Principiante"){
return gymnasticsBeginner;
}

if(level==="Intermedio"){
return gymnasticsIntermediate;
}

return gymnasticsAdvanced;

}

function getPercentages(week){

if(week<=4){
return [65,70,72,75];
}

if(week<=8){
return [75,80,82,85];
}

if(week<=11){
return [85,87,90,92];
}

return [60,60,60,60];

}

function randomItem(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function calcWeight(rm,percent){

return Math.round((rm*percent)/100);

}

function generateStrength(goal,week,squat,deadlift,bench,clean,snatch){

const percentages=getPercentages(week);

const focus=randomItem(strengthFocus);

let percent=randomItem(percentages);

let exerciseHTML="";

switch(focus){

case "Back Squat":
exerciseHTML=`
<div class="exercise">
Back Squat 5x5 @ ${percent}% (${calcWeight(squat,percent)}kg)
</div>
`;
break;

case "Front Squat":
exerciseHTML=`
<div class="exercise">
Front Squat 5x3 @ ${percent}% (${calcWeight(squat*0.85,percent)}kg)
</div>
`;
break;

case "Deadlift":
exerciseHTML=`
<div class="exercise">
Deadlift 5x5 @ ${percent}% (${calcWeight(deadlift,percent)}kg)
</div>
`;
break;

case "Bench Press":
exerciseHTML=`
<div class="exercise">
Bench Press 5x5 @ ${percent}% (${calcWeight(bench,percent)}kg)
</div>
`;
break;

case "Strict Press":
exerciseHTML=`
<div class="exercise">
Strict Press 5x5 @ ${percent}% (${calcWeight(bench*0.65,percent)}kg)
</div>
`;
break;

case "Clean":
exerciseHTML=`
<div class="exercise">
Clean & Jerk 6x2 @ ${percent}% (${calcWeight(clean,percent)}kg)
</div>
`;
break;

case "Snatch":
exerciseHTML=`
<div class="exercise">
Snatch 6x2 @ ${percent}% (${calcWeight(snatch,percent)}kg)
</div>
`;
break;

}

return exerciseHTML;

}

function generateWarmup(day){

const warmups=[
"500m Row + Mobility",
"Bike + Dynamic Stretch",
"Jump Rope + Air Squats",
"Mobility Flow + Assault Bike",
"Shoulder Prep + PVC Drills"
];

return `
<div class="block">
<h3>🔥 Warmup</h3>
${randomItem(warmups)}
</div>
`;

}

function generateGymnastics(level){

let skill=randomItem(getGymnastics(level));

return `
<div class="block">
<h3>🤸 Gymnastics Skill</h3>

${skill}

<br><br>

4 Sets:
<br>
Practice + Drills + Technique
</div>
`;

}

function generateWOD(goal){

let wod="";

if(goal==="Fuerza"){
wod=randomItem(wodsStrength);
}

if(goal==="Aeróbico"){
wod=randomItem(wodsAerobic);
}

if(goal==="Competencia"){
wod=randomItem(wodsCompetition);
}

if(goal==="Híbrido"){
let all=[
...wodsStrength,
...wodsAerobic,
...wodsCompetition
];

wod=randomItem(all);
}

return `
<div class="block">
<h3>🔥 WOD</h3>
${wod}
</div>
`;

}

function generateCooldown(){

return `
<div class="block">
<h3>🧘 Mobility / Cooldown</h3>

${randomItem(mobility)}
<br>
5-10 Min Recovery Flow

</div>
`;

}

function generateDay(day,goal,level,week,squat,deadlift,bench,clean,snatch){

return `

<div class="day">

<h2>📅 Día ${day}</h2>

${generateWarmup(day)}

<div class="block">
<h3>💪 Strength</h3>

${generateStrength(goal,week,squat,deadlift,bench,clean,snatch)}

</div>

${generateGymnastics(level)}

${generateWOD(goal)}

${generateCooldown()}

</div>

`;

}

function generateProgram(){

let goal=document.getElementById("goal").value;

let level=document.getElementById("level").value;

let days=parseInt(document.getElementById("days").value);

let squat=parseInt(document.getElementById("squat").value||100);

let deadlift=parseInt(document.getElementById("deadlift").value||120);

let bench=parseInt(document.getElementById("bench").value||80);

let clean=parseInt(document.getElementById("clean").value||90);

let snatch=parseInt(document.getElementById("snatch").value||70);

let html=`
<h2>🏆 Semana ${currentWeek}</h2>

<p class="small">
Sistema basado en:
- Periodización por bloques
- Fuerza + Skill + Metcon
- Progresión 12 semanas
- Deload semana 12
</p>
`;

for(let i=1;i<=days;i++){

html+=generateDay(
i,
goal,
level,
currentWeek,
squat,
deadlift,
bench,
clean,
snatch
);

}

document.getElementById("output").innerHTML=html;

updateProgress();

saveData();

}

function updateProgress(){

let value=(currentWeek/12)*100;

document.getElementById("bar").style.width=value+"%";

}

function nextWeek(){

if(currentWeek<12){

currentWeek++;

generateProgram();

}

}

function saveData(){

let data={

week:currentWeek,

goal:document.getElementById("goal").value,

level:document.getElementById("level").value

};

localStorage.setItem("crossfitAI",JSON.stringify(data));

}

window.onload=function(){

let saved=localStorage.getItem("crossfitAI");

if(saved){

let data=JSON.parse(saved);

currentWeek=data.week||1;

updateProgress();

}

}

</script>

</body>
</html>
