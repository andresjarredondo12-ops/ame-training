<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELITE TRAINING SYSTEM AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
}

.container{
max-width:1600px;
margin:auto;
}

h1{
margin-bottom:20px;
color:#60a5fa;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab-btn{
padding:14px 22px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
cursor:pointer;
font-weight:bold;
}

.tab-btn.active{
background:#2563eb;
}

.panel{
display:none;
background:#0f172a;
padding:20px;
border-radius:16px;
}

.panel.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#334155;
color:white;
}

button{
padding:14px 22px;
background:#2563eb;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

button:hover{
background:#1d4ed8;
}

.day{
background:#111827;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.block{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:12px;
line-height:1.7;
}

.progress{
height:22px;
background:#1e293b;
border-radius:12px;
overflow:hidden;
margin-top:20px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:1s;
}

</style>
</head>

<body>

<div class="container">

<h1>🏋️ ELITE TRAINING SYSTEM AI</h1>

<div class="tabs">

<button class="tab-btn active" onclick="openTab(event,'crossfit')">
CrossFit
</button>

<button class="tab-btn" onclick="openTab(event,'bodybuilding')">
Musculación
</button>

</div>

<!-- ================= CROSSFIT ================= -->

<div id="crossfit" class="panel active">

<h2>🏋️ CrossFit</h2>

<div class="grid">

<div class="card">
<h3>Objetivo</h3>

<select id="cfGoal">
<option>Fuerza</option>
<option>Aeróbico</option>
<option>Competencia</option>
<option>Híbrido</option>
</select>
</div>

<div class="card">
<h3>Días/Semana</h3>

<select id="cfDays">
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>
</div>

<div class="card">
<h3>Nivel</h3>

<select id="cfLevel">
<option>Principiante</option>
<option>Intermedio</option>
<option>Avanzado</option>
</select>
</div>

</div>

<button onclick="generateCrossfit()">
GENERAR CROSSFIT
</button>

<div id="crossfitOutput"></div>

</div>

<!-- ================= MUSCULACION ================= -->

<div id="bodybuilding" class="panel">

<h2>💪 Musculación</h2>

<div class="grid">

<div class="card">

<h3>Objetivo</h3>

<select id="bbGoal">

<option>Hipertrofia</option>
<option>Fuerza</option>
<option>Powerbuilding</option>

</select>

</div>

<div class="card">

<h3>Días/Semana</h3>

<select id="bbDays">

<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>

</select>

</div>

<div class="card">

<h3>¿Entrenar Piernas?</h3>

<select id="trainLegs">

<option value="yes">Sí</option>
<option value="no">No</option>

</select>

</div>

<div class="card">

<h3>Nivel</h3>

<select id="bbLevel">

<option>Principiante</option>
<option>Intermedio</option>
<option>Avanzado</option>

</select>

</div>

</div>

<button onclick="generateBodybuilding()">
GENERAR MUSCULACIÓN
</button>

<div id="bodybuildingOutput"></div>

</div>

</div>

<script>

/* ================= TABS ================= */

function openTab(event,id){

document.querySelectorAll('.panel').forEach(p=>{
p.classList.remove('active');
});

document.querySelectorAll('.tab-btn').forEach(btn=>{
btn.classList.remove('active');
});

document.getElementById(id).classList.add('active');

event.target.classList.add('active');

}

/* ================= CROSSFIT ================= */

const cfStrength=[
"Back Squat",
"Front Squat",
"Deadlift",
"Strict Press",
"Push Press",
"Snatch",
"Clean & Jerk"
];

const cfSkills=[
"Toes To Bar",
"Chest To Bar",
"Handstand Walk",
"Muscle Up",
"Double Unders",
"Handstand Pushups"
];

const cfWods=[

`
AMRAP 15:
10 Pullups
15 Wall Balls
200m Run
`,

`
FOR TIME:
21-15-9
Thrusters
Burpees
`,

`
EMOM 18:
12 Cal Bike
10 Deadlifts
8 Pullups
`,

`
5 ROUNDS:
400m Run
15 KB Swings
15 Box Jumps
`

];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generateCrossfit(){

let days=parseInt(document.getElementById("cfDays").value);

let html="<h2>🔥 Programación Semanal</h2>";

for(let i=1;i<=days;i++){

html+=`

<div class="day">

<h2>📅 Día ${i}</h2>

<div class="block">

<h3>🔥 Warmup</h3>

500m Row + Dynamic Mobility + Activation

</div>

<div class="block">

<h3>💪 Strength</h3>

${random(cfStrength)}

<br><br>

5x5 Progresivo

</div>

<div class="block">

<h3>🤸 Skill</h3>

${random(cfSkills)}

<br><br>

4 Sets Técnica

</div>

<div class="block">

<h3>🔥 WOD</h3>

${random(cfWods)}

</div>

<div class="block">

<h3>🧘 Cooldown</h3>

5-10 Min Mobility

</div>

</div>

`;

}

document.getElementById("crossfitOutput").innerHTML=html;

}

/* ================= MUSCULACION ================= */

const upperHypertrophy=[

"Bench Press 4x10",
"Incline DB Press 4x12",
"Machine Chest Press 4x15",
"Lat Pulldown 4x12",
"Barbell Row 4x10",
"Seated Cable Row 4x12",
"Lateral Raises 4x15",
"Rear Delt Fly 4x15",
"Barbell Curl 4x12",
"Tricep Pushdown 4x15"

];

const legsHypertrophy=[

"Back Squat 4x10",
"Romanian Deadlift 4x10",
"Leg Press 4x15",
"Leg Curl 4x15",
"Bulgarian Split Squat 4x12",
"Calf Raises 5x20"

];

const upperStrength=[

"Bench Press 5x5",
"Weighted Pullups 5x5",
"Overhead Press 5x5",
"Barbell Row 5x5",
"Weighted Dips 4x6"

];

const lowerStrength=[

"Back Squat 5x5",
"Deadlift 5x3",
"Front Squat 4x5",
"Walking Lunges 4x10"

];

function splitExercises(arr){

let result="";

arr.forEach(ex=>{

result+=ex+"<br>";

});

return result;

}

function generateBodybuilding(){

let goal=document.getElementById("bbGoal").value;

let days=parseInt(document.getElementById("bbDays").value);

let trainLegs=document.getElementById("trainLegs").value;

let html=`<h2>💪 Rutina ${goal}</h2>`;

/* ================= HIPERTROFIA ================= */

if(goal==="Hipertrofia"){

if(days===2){

if(trainLegs==="no"){

html+=`

<div class="day">

<h2>📌 Día 1 - Upper Push</h2>

<div class="block">

${splitExercises([

"Bench Press 4x10",
"Incline DB Press 4x12",
"Shoulder Press 4x10",
"Lateral Raises 4x15",
"Tricep Pushdown 4x15"

])}

</div>

</div>

<div class="day">

<h2>📌 Día 2 - Upper Pull</h2>

<div class="block">

${splitExercises([

"Barbell Row 4x10",
"Lat Pulldown 4x12",
"Seated Row 4x12",
"Face Pull 4x15",
"Barbell Curl 4x12"

])}

</div>

</div>

`;

}else{

html+=`

<div class="day">

<h2>📌 Día 1 - Upper</h2>

<div class="block">

${splitExercises(upperHypertrophy)}

</div>

</div>

<div class="day">

<h2>📌 Día 2 - Legs</h2>

<div class="block">

${splitExercises(legsHypertrophy)}

</div>

</div>

`;

}

}

/* ====== 3 DIAS ====== */

if(days===3){

if(trainLegs==="no"){

html+=`

<div class="day">

<h2>📌 Push</h2>

<div class="block">

${splitExercises([

"Bench Press 4x10",
"Incline DB Press 4x12",
"Shoulder Press 4x10",
"Lateral Raises 4x15"

])}

</div>

</div>

<div class="day">

<h2>📌 Pull</h2>

<div class="block">

${splitExercises([

"Barbell Row 4x10",
"Lat Pulldown 4x12",
"Cable Row 4x12",
"Barbell Curl 4x12"

])}

</div>

</div>

<div class="day">

<h2>📌 Upper Full</h2>

<div class="block">

${splitExercises([

"Weighted Dips 4x10",
"Pullups 4xAMRAP",
"Machine Press 4x15",
"Rear Delt Fly 4x15"

])}

</div>

</div>

`;

}else{

html+=`

<div class="day">

<h2>📌 Push</h2>

<div class="block">

${splitExercises([

"Bench Press 4x10",
"Shoulder Press 4x10",
"Lateral Raises 4x15"

])}

</div>

</div>

<div class="day">

<h2>📌 Pull</h2>

<div class="block">

${splitExercises([

"Barbell Row 4x10",
"Lat Pulldown 4x12",
"Barbell Curl 4x12"

])}

</div>

</div>

<div class="day">

<h2>📌 Legs</h2>

<div class="block">

${splitExercises(legsHypertrophy)}

</div>

</div>

`;

}

}

/* ====== 4+ DIAS ====== */

if(days>=4){

if(trainLegs==="no"){

let upperDays=[

"Push A",
"Pull A",
"Push B",
"Pull B"

];

upperDays.forEach((d,index)=>{

html+=`

<div class="day">

<h2>📌 ${d}</h2>

<div class="block">

${splitExercises(upperHypertrophy)}

</div>

</div>

`;

});

}else{

let split=["Push","Pull","Legs","Upper"];

split.forEach((d,index)=>{

html+=`

<div class="day">

<h2>📌 ${d}</h2>

<div class="block">

${d==="Legs"
?splitExercises(legsHypertrophy)
:splitExercises(upperHypertrophy)}

</div>

</div>

`;

});

}

}

}

/* ================= FUERZA ================= */

if(goal==="Fuerza"){

if(trainLegs==="no"){

html+=`

<div class="day">

<h2>🏋️ Upper Strength A</h2>

<div class="block">

${splitExercises([

"Bench Press 5x5",
"Weighted Pullups 5x5",
"Overhead Press 5x5",
"Barbell Row 5x5"

])}

</div>

</div>

<div class="day">

<h2>🏋️ Upper Strength B</h2>

<div class="block">

${splitExercises([

"Incline Bench 5x5",
"Weighted Dips 5x5",
"Pendlay Row 5x5",
"Chinups 5x5"

])}

</div>

</div>

`;

}else{

html+=`

<div class="day">

<h2>🏋️ Upper</h2>

<div class="block">

${splitExercises(upperStrength)}

</div>

</div>

<div class="day">

<h2>🏋️ Lower</h2>

<div class="block">

${splitExercises(lowerStrength)}

</div>

</div>

`;

}

}

/* ================= POWERBUILDING ================= */

if(goal==="Powerbuilding"){

html+=`

<div class="day">

<h2>💥 Powerbuilding Upper</h2>

<div class="block">

Bench Press 5x5<br>
Incline DB Press 4x12<br>
Weighted Pullups 5x5<br>
Rows 4x12<br>

</div>

</div>

`;

if(trainLegs==="yes"){

html+=`

<div class="day">

<h2>💥 Powerbuilding Lower</h2>

<div class="block">

Back Squat 5x5<br>
Deadlift 5x3<br>
Leg Press 4x15<br>
Bulgarian Split Squat 4x12<br>

</div>

</div>

`;

}

}

document.getElementById("bodybuildingOutput").innerHTML=html;

}

</script>

</body>
</html>
