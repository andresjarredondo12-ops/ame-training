<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossFit Box Programming PRO</title>

<style>
body{margin:0;background:#0b1020;color:white;font-family:Arial;padding:20px}
.container{max-width:1200px;margin:auto}
h1{color:#60a5fa}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.card{background:#1f2937;padding:10px;border-radius:10px}
input,select{width:100%;padding:10px;border-radius:8px;border:0;background:#111827;color:white}
button{padding:12px;background:#2563eb;border:0;color:white;font-weight:bold;border-radius:10px;cursor:pointer;margin-top:10px}
.day{margin-top:20px;background:#111827;padding:15px;border-radius:10px}
.block{background:#1f2937;padding:10px;margin-top:10px;border-radius:10px}
.small{opacity:.8;font-size:13px}
.ex{padding:6px;background:#374151;margin:5px 0;border-radius:6px}
</style>
</head>

<body>

<div class="container">

<h1>🏋️ CrossFit Box Programming PRO (12 semanas)</h1>

<div class="grid">

<div class="card">
Días por semana
<select id="days">
<option>3</option>
<option>4</option>
<option>5</option>
</select>
</div>

<div class="card">
Back Squat RM
<input id="sq">
</div>

<div class="card">
Deadlift RM
<input id="dl">
</div>

<div class="card">
Press RM
<input id="bp">
</div>

<div class="card">
Nivel
<select id="lvl">
<option>Intermedio</option>
<option>Avanzado</option>
</select>
</div>

</div>

<button onclick="gen()">Generar Programación BOX PRO</button>

<div id="out"></div>

</div>

<script>

function w(rm,p){return Math.round(rm*p/100)}

/* ================= WODS POR SISTEMA ================= */

const wodShort=[
"FOR TIME: 15-12-9 Thrusters + Burpees",
"EMOM 10: 10 Cal Row + 8 Deadlift",
"AMRAP 8: Burpees + Box Jump",
]

const wodEngine=[
"Row 5k steady pace",
"Bike 20 min zone 2",
"Run 6x800m pace control",
]

const wodLong=[
"AMRAP 20: Run + Wall Ball + KB Swing",
"FOR TIME: 800m run + circuit 4 rounds",
"Chipper: 50-40-30-20-10 reps mixed",
]

const skills=[
"Handstand Walk",
"Muscle Up Progression",
"Snatch technique",
"Clean & Jerk technique"
]

function random(a){
return a[Math.floor(Math.random()*a.length)]
}

/* ================= PERIODIZACION REAL ================= */

function intensity(week){
if(week<=3) return 70
if(week<=6) return 75
if(week<=9) return 82
return 65 // deload
}

/* ================= DISEÑO BOX REAL ================= */

function gen(){

let days=parseInt(document.getElementById("days").value)
let sq=parseInt(document.getElementById("sq").value||140)
let dl=parseInt(document.getElementById("dl").value||180)
let bp=parseInt(document.getElementById("bp").value||100)

let html="<h2>📊 12 Semanas CrossFit Box PRO</h2>"

for(let w=1; w<=12; w++){

html+=`<div class="day">
<h3>Semana ${w}</h3>`

for(let d=1; d<=days; d++){

let type=(d+w)%3
let p=intensity(w)

html+=`<div class="block">
<h4>Día ${d}</h4>`

/* ================= ESTILO BOX REAL ================= */

if(type===0){

html+=`
<div class="small">FOCUS: FUERZA + METCON CORTO</div>

<div class="ex">Back Squat 5x5 @ ${p}% (${w(sq,p)}kg)</div>
<div class="ex">Deadlift 5x3 @ ${p+3}% (${w(dl,p+3)}kg)</div>

<div class="ex">${random(wodShort)}</div>
`
}

if(type===1){

html+=`
<div class="small">FOCUS: ENGINE / AERÓBICO</div>

<div class="ex">${random(wodEngine)}</div>
<div class="ex">Core + movilidad 15 min</div>
`
}

if(type===2){

html+=`
<div class="small">FOCUS: SKILL + METCON</div>

<div class="ex">Skill: ${random(skills)}</div>

<div class="ex">Bench Press 4x8 @ ${p-5}% (${w(bp,p-5)}kg)</div>

<div class="ex">${random(wodLong)}</div>
`
}

html+=`</div>`
}

html+=`</div>`
}

document.getElementById("out").innerHTML=html
}

</script>

</body>
</html>
