<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELITE TRAINING AI PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
}

.container{
max-width:1600px;
margin:auto;
}

h1{
margin-bottom:20px;
color:#60a5fa;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab-btn{
padding:14px 22px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
cursor:pointer;
font-weight:bold;
}

.tab-btn.active{
background:#2563eb;
}

.panel{
display:none;
background:#0f172a;
padding:20px;
border-radius:16px;
}

.panel.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#334155;
color:white;
}

button{
padding:14px 22px;
background:#2563eb;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

button:hover{
background:#1d4ed8;
}

.day{
background:#111827;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.block{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:12px;
line-height:1.8;
}

.exercise{
padding:10px;
background:#334155;
border-radius:10px;
margin-bottom:10px;
}

.small{
opacity:0.8;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>🏋️ ELITE TRAINING AI PRO</h1>

<div class="tabs">

<button class="tab-btn active" onclick="openTab(event,'bodybuilding')">
Musculación
</button>

</div>

<!-- ================= MUSCULACION ================= -->

<div id="bodybuilding" class="panel active">

<h2>💪 Musculación Inteligente</h2>

<div class="grid">

<div class="card">

<h3>Objetivo</h3>

<select id="goal">

<option>Hipertrofia</option>
<option>Fuerza</option>
<option>Powerbuilding</option>

</select>

</div>

<div class="card">

<h3>Días/Semana</h3>

<select id="days">

<option>2</option>
<option>3</option>
<option>4</option>

</select>

</div>

<div class="card">

<h3>¿Entrenar Piernas?</h3>

<select id="legs">

<option value="yes">Sí</option>
<option value="no">No</option>

</select>

</div>

</div>

<!-- ================= RM INPUTS ================= -->

<h2 style="margin-top:30px;">🏋️ Configuración RM</h2>

<div class="grid">

<div class="card">
<h3>Bench Press RM</h3>
<input type="number" id="benchRM" placeholder="Ej: 100">
</div>

<div class="card">
<h3>Incline Bench RM</h3>
<input type="number" id="inclineRM" placeholder="Ej: 90">
</div>

<div class="card">
<h3>Overhead Press RM</h3>
<input type="number" id="ohpRM" placeholder="Ej: 70">
</div>

<div class="card">
<h3>Barbell Row RM</h3>
<input type="number" id="rowRM" placeholder="Ej: 100">
</div>

<div class="card">
<h3>Weighted Pullup RM</h3>
<input type="number" id="pullupRM" placeholder="Ej: 40">
</div>

<div class="card">
<h3>Back Squat RM</h3>
<input type="number" id="squatRM" placeholder="Ej: 140">
</div>

<div class="card">
<h3>Deadlift RM</h3>
<input type="number" id="deadliftRM" placeholder="Ej: 180">
</div>

<div class="card">
<h3>Front Squat RM</h3>
<input type="number" id="frontSquatRM" placeholder="Ej: 120">
</div>

</div>

<button onclick="generateRoutine()">
GENERAR RUTINA
</button>

<div id="output"></div>

</div>

</div>

<script>

function openTab(event,id){

document.querySelectorAll('.panel').forEach(p=>{
p.classList.remove('active');
});

document.querySelectorAll('.tab-btn').forEach(btn=>{
btn.classList.remove('active');
});

document.getElementById(id).classList.add('active');

event.target.classList.add('active');

}

/* ================= HELPERS ================= */

function calcWeight(rm,percent){

return Math.round((rm*percent)/100);

}

function exercise(name,sets,reps,percent,rm){

let weight=calcWeight(rm,percent);

return `

<div class="exercise">

<strong>${name}</strong>

<br>

${sets}x${reps}

<br>

${percent}% RM

<br>

Peso objetivo: ${weight} kg

</div>

`;

}

/* ================= GENERADOR ================= */

function generateRoutine(){

let goal=document.getElementById("goal").value;

let days=parseInt(document.getElementById("days").value);

let trainLegs=document.getElementById("legs").value;

/* ================= RMS ================= */

let benchRM=parseInt(document.getElementById("benchRM").value||100);

let inclineRM=parseInt(document.getElementById("inclineRM").value||90);

let ohpRM=parseInt(document.getElementById("ohpRM").value||70);

let rowRM=parseInt(document.getElementById("rowRM").value||100);

let pullupRM=parseInt(document.getElementById("pullupRM").value||40);

let squatRM=parseInt(document.getElementById("squatRM").value||140);

let deadliftRM=parseInt(document.getElementById("deadliftRM").value||180);

let frontSquatRM=parseInt(document.getElementById("frontSquatRM").value||120);

let html=`<h2>💪 Rutina ${goal}</h2>`;

/* ================= HIPERTROFIA ================= */

if(goal==="Hipertrofia"){

if(days===2){

if(trainLegs==="no"){

html+=`

<div class="day">

<h2>📌 Upper Push</h2>

<div class="block">

${exercise("Bench Press",4,10,72,benchRM)}

${exercise("Incline Bench Press",4,12,70,inclineRM)}

${exercise("Overhead Press",4,10,68,ohpRM)}

<div class="exercise">
Lateral Raises 4x15
</div>

<div class="exercise">
Tricep Pushdown 4x15
</div>

</div>

</div>

<div class="day">

<h2>📌 Upper Pull</h2>

<div class="block">

${exercise("Barbell Row",4,10,72,rowRM)}

${exercise("Weighted Pullup",4,8,75,pullupRM)}

<div class="exercise">
Lat Pulldown 4x12
</div>

<div class="exercise">
Face Pull 4x15
</div>

<div class="exercise">
Barbell Curl 4x12
</div>

</div>

</div>

`;

}else{

html+=`

<div class="day">

<h2>📌 Upper</h2>

<div class="block">

${exercise("Bench Press",4,10,72,benchRM)}

${exercise("Barbell Row",4,10,72,rowRM)}

${exercise("Overhead Press",4,10,68,ohpRM)}

</div>

</div>

<div class="day">

<h2>📌 Legs</h2>

<div class="block">

${exercise("Back Squat",4,10,72,squatRM)}

${exercise("Deadlift",4,8,75,deadliftRM)}

${exercise("Front Squat",4,10,70,frontSquatRM)}

<div class="exercise">
Leg Press 4x15
</div>

</div>

</div>

`;

}

}

/* ================= FUERZA ================= */

if(goal==="Fuerza"){

if(trainLegs==="no"){

html+=`

<div class="day">

<h2>🏋️ Upper Strength A</h2>

<div class="block">

${exercise("Bench Press",5,5,82,benchRM)}

${exercise("Weighted Pullup",5,5,82,pullupRM)}

${exercise("Overhead Press",5,5,80,ohpRM)}

${exercise("Barbell Row",5,5,82,rowRM)}

</div>

</div>

<div class="day">

<h2>🏋️ Upper Strength B</h2>

<div class="block">

${exercise("Incline Bench",5,5,85,inclineRM)}

${exercise("Barbell Row",5,5,85,rowRM)}

${exercise("Weighted Pullup",5,5,85,pullupRM)}

</div>

</div>

`;

}else{

html+=`

<div class="day">

<h2>🏋️ Upper</h2>

<div class="block">

${exercise("Bench Press",5,5,82,benchRM)}

${exercise("Overhead Press",5,5,80,ohpRM)}

${exercise("Barbell Row",5,5,82,rowRM)}

</div>

</div>

<div class="day">

<h2>🏋️ Lower</h2>

<div class="block">

${exercise("Back Squat",5,5,82,squatRM)}

${exercise("Deadlift",5,3,87,deadliftRM)}

${exercise("Front Squat",4,5,80,frontSquatRM)}

</div>

</div>

`;

}

}

/* ================= POWERBUILDING ================= */

if(goal==="Powerbuilding"){

html+=`

<div class="day">

<h2>💥 Upper Powerbuilding</h2>

<div class="block">

${exercise("Bench Press",5,5,80,benchRM)}

${exercise("Incline Bench",4,10,72,inclineRM)}

${exercise("Barbell Row",5,5,80,rowRM)}

${exercise("Weighted Pullup",4,8,75,pullupRM)}

</div>

</div>

`;

if(trainLegs==="yes"){

html+=`

<div class="day">

<h2>💥 Lower Powerbuilding</h2>

<div class="block">

${exercise("Back Squat",5,5,82,squatRM)}

${exercise("Deadlift",5,3,87,deadliftRM)}

${exercise("Front Squat",4,8,75,frontSquatRM)}

<div class="exercise">
Leg Press 4x15
</div>

</div>

</div>

`;

}

}

document.getElementById("output").innerHTML=html;

}

</script>

</body>
</html>
