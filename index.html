<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossFit Pro Periodization</title>

<style>
body{margin:0;background:#0b1020;color:white;font-family:Arial;padding:20px}
.container{max-width:1200px;margin:auto}
h1{color:#60a5fa}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.card{background:#1f2937;padding:10px;border-radius:10px}
input,select{width:100%;padding:10px;border-radius:8px;border:0;background:#111827;color:white}
button{padding:12px;background:#2563eb;border:0;color:white;font-weight:bold;border-radius:10px;cursor:pointer;margin-top:10px}
.day{margin-top:20px;background:#111827;padding:15px;border-radius:10px}
.block{background:#1f2937;padding:10px;margin-top:10px;border-radius:10px}
.ex{padding:6px;background:#374151;margin:5px 0;border-radius:6px}
.small{opacity:.8;font-size:13px}
</style>
</head>

<body>

<div class="container">

<h1>🏋️ CrossFit Pro Periodization (12 semanas)</h1>

<div class="grid">

<div class="card">
Días por semana
<select id="days">
<option>3</option>
<option>4</option>
<option>5</option>
</select>
</div>

<div class="card">
Back Squat RM
<input id="sq" type="number">
</div>

<div class="card">
Deadlift RM
<input id="dl" type="number">
</div>

<div class="card">
Press RM
<input id="bp" type="number">
</div>

<div class="card">
Nivel atleta
<select id="lvl">
<option>Intermedio</option>
<option>Avanzado</option>
</select>
</div>

</div>

<button onclick="generate()">Generar Programación PRO</button>

<div id="out"></div>

</div>

<script>

function pct(week,base){

// periodización real 3 bloques + deload

if(week<=3) return base-10
if(week<=6) return base
if(week<=9) return base+5
return base-15
}

function w(rm,p){return Math.round(rm*p/100)}

function ex(name,sets,reps,p,rm){
return `<div class="ex">${name} ${sets}x${reps} | ${p}% | ${w(rm,p)}kg</div>`
}

/* ================= WODS POR SISTEMA ================= */

const wods=[
"AMRAP 12: 10 Burpees + 12 Wall Balls + 200m Run",
"FOR TIME: 21-15-9 Thrusters + Pullups",
"EMOM 16: 12 Cal Row + 10 Deadlift ligero + 8 Burpees",
"INTERVALOS: 5x400m Run descanso corto"
]

const skills=[
"Handstand Walk técnica",
"Muscle Up progresiones",
"Double Unders eficiencia",
"Toes to Bar control"
]

function random(a){
return a[Math.floor(Math.random()*a.length)]
}

/* ================= PLANIFICACION PRO ================= */

function generate(){

let days=parseInt(document.getElementById("days").value)
let sq=parseInt(document.getElementById("sq").value||140)
let dl=parseInt(document.getElementById("dl").value||180)
let bp=parseInt(document.getElementById("bp").value||100)

let html="<h2>📊 Planificación 12 semanas CrossFit PRO</h2>"

for(let w=1; w<=12; w++){

html+=`<div class="day">
<h3>Semana ${w}</h3>`

// tipos de sesión estructurados

for(let d=1; d<=days; d++){

let type = (d + w) % 3

html+=`<div class="block">
<h4>Día ${d}</h4>`

/* ================= ESTRUCTURA REAL ================= */

if(type===0){

// FUERZA + WOD corto intenso
html+=`
<div class="small">FOCUS: Fuerza + Potencia</div>
${ex("Back Squat",5,5,pct(w,80),sq)}
${ex("Deadlift",5,3,pct(w,85),dl)}

<div class="ex">WOD: Sprint 8-10 min (alta intensidad)</div>
`
}

if(type===1){

// ENGINE DAY
html+=`
<div class="small">FOCUS: Aeróbico / Engine</div>
<div class="ex">Row 3-5km ritmo constante</div>
<div class="ex">Bike intervals 6x2 min</div>
<div class="ex">Core + movilidad activa</div>
`
}

if(type===2){

// SKILL + MODERADO
html+=`
<div class="small">FOCUS: Skill + Metcon medio</div>
<div class="ex">Skill: ${random(skills)}</div>
<div class="ex">Bench Press 4x8 | ${pct(w,75)}%</div>
<div class="ex">WOD: AMRAP 12 controlado</div>
`
}

html+=`</div>`
}

html+=`</div>`
}

out.innerHTML=html
}

</script>

</body>
</html>
