<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELITE TRAINING SYSTEM PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
}

.container{
max-width:1600px;
margin:auto;
}

h1{
margin-bottom:20px;
color:#60a5fa;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab-btn{
padding:14px 22px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
cursor:pointer;
font-weight:bold;
}

.tab-btn.active{
background:#2563eb;
}

.panel{
display:none;
background:#0f172a;
padding:20px;
border-radius:16px;
}

.panel.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#334155;
color:white;
}

button{
padding:14px 22px;
background:#2563eb;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

button:hover{
background:#1d4ed8;
}

.day{
background:#111827;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.block{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:12px;
}

.progress{
height:22px;
background:#1e293b;
border-radius:12px;
overflow:hidden;
margin-top:20px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:1s;
}

.small{
opacity:0.8;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>🏋️ ELITE TRAINING SYSTEM PRO</h1>

<div class="tabs">
<button class="tab-btn active" onclick="openTab(event,'crossfit')">CrossFit</button>
<button class="tab-btn" onclick="openTab(event,'bodybuilding')">Musculación</button>
</div>

<!-- ================= CROSSFIT ================= -->

<div id="crossfit" class="panel active">

<h2>🏋️ CrossFit Programming</h2>

<div class="grid">

<div class="card">
<h3>Objetivo</h3>

<select id="cfGoal">
<option>Fuerza</option>
<option>Aeróbico</option>
<option>Competencia</option>
<option>Híbrido</option>
</select>
</div>

<div class="card">
<h3>Nivel</h3>

<select id="cfLevel">
<option>Principiante</option>
<option>Intermedio</option>
<option>Avanzado</option>
</select>
</div>

<div class="card">
<h3>Días/Semana</h3>

<select id="cfDays">
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>
</div>

<div class="card">
<h3>Back Squat RM</h3>
<input type="number" id="cfSquat">
</div>

<div class="card">
<h3>Deadlift RM</h3>
<input type="number" id="cfDeadlift">
</div>

<div class="card">
<h3>Bench RM</h3>
<input type="number" id="cfBench">
</div>

<div class="card">
<h3>Clean RM</h3>
<input type="number" id="cfClean">
</div>

<div class="card">
<h3>Snatch RM</h3>
<input type="number" id="cfSnatch">
</div>

</div>

<button onclick="generateCrossfit()">GENERAR PLAN</button>
<button onclick="nextCFWeek()">ACTUALIZAR SEMANA</button>

<div class="progress">
<div class="bar" id="cfBar"></div>
</div>

<div id="crossfitOutput"></div>

</div>

<!-- ================= MUSCULACION ================= -->

<div id="bodybuilding" class="panel">

<h2>💪 Musculación Inteligente</h2>

<div class="grid">

<div class="card">
<h3>Objetivo</h3>

<select id="bbGoal">
<option>Hipertrofia</option>
<option>Fuerza</option>
<option>Powerbuilding</option>
<option>Resistencia</option>
</select>
</div>

<div class="card">
<h3>Nivel</h3>

<select id="bbLevel">
<option>Principiante</option>
<option>Intermedio</option>
<option>Avanzado</option>
</select>
</div>

<div class="card">
<h3>Días/Semana</h3>

<select id="bbDays">
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>
</div>

<div class="card">
<h3>Bench RM</h3>
<input type="number" id="bbBench">
</div>

<div class="card">
<h3>Squat RM</h3>
<input type="number" id="bbSquat">
</div>

<div class="card">
<h3>Deadlift RM</h3>
<input type="number" id="bbDeadlift">
</div>

</div>

<button onclick="generateBodybuilding()">GENERAR RUTINA</button>
<button onclick="nextBBWeek()">ACTUALIZAR SEMANA</button>

<div class="progress">
<div class="bar" id="bbBar"></div>
</div>

<div id="bodybuildingOutput"></div>

</div>

</div>

<script>

let cfWeek=1;
let bbWeek=1;

function openTab(event,id){

document.querySelectorAll('.panel').forEach(p=>{
p.classList.remove('active');
});

document.querySelectorAll('.tab-btn').forEach(b=>{
b.classList.remove('active');
});

document.getElementById(id).classList.add('active');

event.target.classList.add('active');

}

/* ================= CROSSFIT ================= */

const cfStrength=[
"Back Squat",
"Front Squat",
"Deadlift",
"Strict Press",
"Push Press",
"Bench Press",
"Clean",
"Snatch"
];

const cfSkills=[
"Toes To Bar",
"Chest To Bar",
"Ring Muscle Up",
"Handstand Walk",
"Double Unders",
"Handstand Pushups",
"Bar Muscle Up"
];

const cfWods=[

`
AMRAP 15:
10 Pullups
15 Wall Balls
200m Run
`,

`
FOR TIME:
21-15-9
Thrusters
Burpees
`,

`
EMOM 16:
1: 15 Cal Bike
2: 12 Deadlifts
3: 10 Pullups
4: Rest
`,

`
5 ROUNDS:
400m Run
15 Box Jumps
15 KB Swings
`,

`
CHIPPER:
50 DU
40 Situps
30 Cleans
20 Burpees
10 HSPU
`

];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function cfPercentages(week){

if(week<=4) return [65,70,72,75];

if(week<=8) return [75,80,82,85];

if(week<=11) return [85,88,90,92];

return [60];

}

function calc(rm,p){
return Math.round((rm*p)/100);
}

function generateCrossfit(){

let days=parseInt(document.getElementById("cfDays").value);

let squat=parseInt(document.getElementById("cfSquat").value||100);
let deadlift=parseInt(document.getElementById("cfDeadlift").value||120);
let bench=parseInt(document.getElementById("cfBench").value||80);
let clean=parseInt(document.getElementById("cfClean").value||90);
let snatch=parseInt(document.getElementById("cfSnatch").value||70);

let html=`<h2>📅 Semana ${cfWeek}</h2>`;

for(let d=1;d<=days;d++){

let exercise=random(cfStrength);

let p=random(cfPercentages(cfWeek));

let weight="";

if(exercise.includes("Squat")){
weight=calc(squat,p);
}

if(exercise==="Deadlift"){
weight=calc(deadlift,p);
}

if(exercise.includes("Bench")||exercise.includes("Press")){
weight=calc(bench,p);
}

if(exercise==="Clean"){
weight=calc(clean,p);
}

if(exercise==="Snatch"){
weight=calc(snatch,p);
}

html+=`

<div class="day">

<h2>🏋️ Día ${d}</h2>

<div class="block">

<h3>🔥 Warmup</h3>

500m Row + Mobility + Dynamic Stretch

</div>

<div class="block">

<h3>💪 Strength</h3>

${exercise}

<br><br>

5 Sets x 5 Reps @ ${p}% (${weight}kg)

</div>

<div class="block">

<h3>🤸 Gymnastics Skill</h3>

${random(cfSkills)}

<br><br>

4 Sets Technique Work

</div>

<div class="block">

<h3>🔥 WOD</h3>

${random(cfWods)}

</div>

<div class="block">

<h3>🧘 Cooldown</h3>

5-10 Min Mobility Flow

</div>

</div>

`;

}

document.getElementById("crossfitOutput").innerHTML=html;

document.getElementById("cfBar").style.width=((cfWeek/12)*100)+"%";

}

/* ================= BODYBUILDING ================= */

const hypertrophyExercises={

push:[
"Bench Press 4x10",
"Incline DB Press 4x12",
"Shoulder Press 4x10",
"Lateral Raises 4x15",
"Tricep Pushdowns 4x15"
],

pull:[
"Barbell Row 4x10",
"Lat Pulldown 4x12",
"Seated Cable Row 4x12",
"Barbell Curl 4x12",
"Hammer Curl 4x15"
],

legs:[
"Back Squat 4x10",
"Romanian Deadlift 4x10",
"Leg Press 4x15",
"Leg Curl 4x15",
"Calf Raises 5x20"
]

};

const strengthExercises={

upper:[
"Bench Press 5x5",
"Overhead Press 5x5",
"Weighted Pullups 5x5",
"Barbell Rows 5x5"
],

lower:[
"Back Squat 5x5",
"Deadlift 5x3",
"Front Squat 4x5",
"Walking Lunges 4x10"
]

};

function generateBodybuilding(){

let goal=document.getElementById("bbGoal").value;

let days=parseInt(document.getElementById("bbDays").value);

let html=`<h2>💪 Semana ${bbWeek}</h2>`;

if(goal==="Hipertrofia"){

let split=[];

if(days===2){
split=["push","legs"];
}

if(days===3){
split=["push","pull","legs"];
}

if(days===4){
split=["push","pull","legs","upper"];
}

if(days>=5){
split=["push","pull","legs","push","pull"];
}

split.forEach((part,index)=>{

html+=`
<div class="day">

<h2>📌 Día ${index+1}</h2>

<div class="block">

<h3>${part.toUpperCase()}</h3>

`;

if(hypertrophyExercises[part]){

hypertrophyExercises[part].forEach(ex=>{

html+=`${ex}<br>`;

});

}else{

html+=`
Bench Press 4x10<br>
Rows 4x12<br>
Squat 4x10
`;

}

html+=`
</div>
</div>
`;

});

}

if(goal==="Fuerza"){

let split=[];

if(days===2){
split=["upper","lower"];
}

if(days===3){
split=["upper","lower","upper"];
}

if(days>=4){
split=["upper","lower","upper","lower"];
}

split.forEach((part,index)=>{

html+=`

<div class="day">

<h2>🏋️ Día ${index+1}</h2>

<div class="block">

<h3>${part.toUpperCase()}</h3>

`;

strengthExercises[part].forEach(ex=>{

html+=`${ex}<br>`;

});

html+=`

</div>

</div>

`;

});

}

if(goal==="Powerbuilding"){

html+=`

<div class="day">

<h2>💥 Powerbuilding</h2>

<div class="block">

Bench Press 5x5<br>
Back Squat 5x5<br>
Deadlift 5x5<br>
Incline DB Press 4x12<br>
Rows 4x12<br>
Leg Press 4x15<br>

</div>

</div>

`;

}

if(goal==="Resistencia"){

html+=`

<div class="day">

<h2>🔥 Muscular Endurance</h2>

<div class="block">

Circuit x5:

<br><br>

20 Pushups<br>
20 Air Squats<br>
20 Situps<br>
20 KB Swings<br>
400m Run<br>

</div>

</div>

`;

}

document.getElementById("bodybuildingOutput").innerHTML=html;

document.getElementById("bbBar").style.width=((bbWeek/12)*100)+"%";

}

function nextCFWeek(){

if(cfWeek<12){

cfWeek++;

generateCrossfit();

}

}

function nextBBWeek(){

if(bbWeek<12){

bbWeek++;

generateBodybuilding();

}

}

</script>

</body>
</html>
